id: hl7.fhir.uv.epi-asean
canonical: http://hl7.org/fhir/uv/epi-asean
name: APACePI
title: "ePI Implementation Guide for the Asia Partnership Conference of Pharmaceutical Associations (APAC)"
status: draft
version: 0.1.0
fhirVersion: 5.0.0
copyrightYear: 2024+
releaseLabel: ci-build

# The ePI reference Bundles (SmPC & PIL) use FHIR R5 resource types
# (MedicinalProductDefinition, ClinicalUseDefinition, etc.), so this IG is R5.
parameters:
  autoload-resources: true
  path-resource:
    - input/instances
publisher:
  name: Asia Partnership Conference of Pharmaceutical Associations (APAC)
  url: http://www.hl7.org/Special/committees/rcrim
jurisdiction: http://unstats.un.org/unsd/methods/m49/m49.htm#001 "World"

# HL7 universal-realm IGs must declare a sponsoring work group. This IG extends
# the BR&R Vulcan Global Core ePI IG, so it is sponsored by BR&R (rcrim).
extension:
  - url: http://hl7.org/fhir/StructureDefinition/structuredefinition-wg
    valueCode: brr

pages:
  index.md:
    title: Home
  usecases.md:
    title: Use Cases
  epiElements.md:
    title: ePI Elements
  terminology.md:
    title: Terminology
  buildguide.md:
    title: ePI Build Guide (SG)
  sg-epi-pilot.md:
    title: SG ePI Pilot
  appendix1.md:
    title: National Label Templates
  appendix2.md:
    title: Regional Showcase
  downloads.md:
    title: Downloads
  credits.md:
    title: Credits
  # Pages retained for build but no longer in the top navigation
  TechStyleGuide.md:
    title: Best Practice
  showcase.md:
    title: Showcase

# Navigation modelled on the Vulcan Global Core ePI IG
menu:
  Home: index.html
  Use Cases: usecases.html
  ePI Creation:
    ePI Elements: epiElements.html
    Terminology: terminology.html
  Build Guide: buildguide.html
  SG ePI Pilot: sg-epi-pilot.html
  National Label Templates: appendix1.html
  Regional Showcase: appendix2.html
  Artifacts: artifacts.html
  Downloads: downloads.html
  Credits: credits.html

instanceOptions:
  manualSliceOrdering: true
